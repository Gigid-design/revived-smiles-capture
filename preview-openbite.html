<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Revived Smiles – Open Bite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    /* ── 932 × 430 landscape frame ── */
    .frame {
      width: 932px;
      height: 430px;
      background: #121212;
      border: 1px solid #000;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── Title "Close Bite" ── */
    /* Portrait: left=389, right=17, top=465.5 → CCW: x=465.5 (left edge), y≈17 */
    .title {
      position: absolute;
      top: 17px;
      left: 0; right: 0;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      z-index: 10;
    }

    /* ── Tab strip ── */
    /* Centred horizontally, top ≈ 47px */
    .tab-strip {
      position: absolute;
      top: 47px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      background: #0a0a0a;
      border-radius: 80px;
      padding: 4px;
      height: 40px;
      z-index: 10;
    }
    .tab-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 0 12px;
      height: 32px;
      border-radius: 50px;
      white-space: nowrap;
      min-width: 102px;
    }
    .tab-item--active { background: #2f2f2f; }
    .tab-num {
      width: 17px; height: 17px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; flex-shrink: 0;
    }
    .tab-item--inactive .tab-num { background: #3a3a3a; color: #0a0a0a; }
    .tab-item--active   .tab-num { background: #fff;    color: #0a0a0a; }
    .tab-label { font-size: 12px; font-weight: 500; }
    .tab-item--inactive .tab-label { color: #aaabaf; }
    .tab-item--active   .tab-label { color: #fff; }

    /* Captured state — green badge */
    .tab-item--captured .tab-num {
      background: #22c55e;
      color: #fff;
    }
    .tab-item--captured .tab-label { color: #fff; }
    .tab-item--captured.tab-item--active .tab-num { background: #22c55e; }

    /* ── Left sidebar icon buttons ── */
    /* All at portrait top=49 → landscape x=49. Width=56, height=57.
       y = 430 − portrait_left − 56 */
    .icon-btn {
      position: absolute;
      left: 22px;         /* centres 56px btn: 49 - 56/2 ≈ 22 */
      width: 56px; height: 57px;
      border-radius: 12px;
      overflow: hidden;
      z-index: 10;
    }
    .icon-btn img {
      width: 100%; height: 100%;
      display: block;
      object-fit: cover;
    }
    /* Purple button keeps its background colour */
    .icon-btn--purple {
      background: #4e5269;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn--purple img {
      width: 32px; height: 27px;
      object-fit: contain;
    }

    /* ── Camera viewfinder oval ── */
    /* Portrait: left=97, top=253, w=237, h=453
       CCW → x=253, y=430−97−237=96, displayed w=453, h=237 */
    .viewfinder {
      position: absolute;
      left: 253px; top: 96px;
      width: 453px; height: 237px;
      border: 3px solid #fff;
      border-radius: 130px;
      background: linear-gradient(
        250.878deg,
        rgba(222, 231, 242, 0.50) 18.976%,
        rgba(101, 153, 220, 0.50) 84.179%
      );
      overflow: hidden;
      z-index: 5;
    }
    .viewfinder-photo {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    /* Caption bar — inside viewfinder, near bottom
       Portrait h-direction top=183 in 237px container → landscape y=237−183−24=30px from bottom = 207px from top */
    .caption-bar {
      position: absolute;
      width: 244px; height: 24px;
      left: calc(50% - 122px);
      top: 190px;
      background: #2f2f2f;
      border-radius: 5px;
      display: flex;
      align-items: center;
      padding-left: 20px;
    }
    .caption-dot {
      position: absolute;
      left: 9px; top: 10px;
      width: 4px; height: 4px;
    }
    .caption-dot img { width: 100%; height: 100%; display: block; }
    .caption-text {
      font-size: 12px; font-weight: 400;
      color: #aaabaf;
      line-height: 18.2px;
      white-space: nowrap;
    }

    /* ── Thumbnail photo ── */
    /* Portrait: left=43, top=348, w=56, h=56
       CCW → x=348, y=430−43−56=331 */
    .thumbnail {
      position: absolute;
      left: 348px; top: 331px;
      width: 56px; height: 56px;
      border-radius: 7px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 0 0 2px rgba(248, 248, 248, 0.50);
      z-index: 10;
    }
    .thumbnail img {
      position: absolute;
      top: 0; left: 0;
      width: 141px; height: 94px;
      object-fit: cover;
    }

    /* ── Shutter button ── */
    /* Portrait: left=35, top=446, w=72, h=72
       CCW → x=446, y=430−35−72=323 */
    .shutter {
      position: absolute;
      left: 446px; top: 323px;
      width: 72px; height: 72px;
      z-index: 10;
    }
    .shutter img { width: 100%; height: 100%; display: block; }

    /* ── Image placeholder box ── */
    /* Portrait: left=192, top=825, w=56, h=56
       CCW → x=825, y=430−192−56=182 */
    .img-box {
      position: absolute;
      left: 825px; top: 182px;
      width: 56px; height: 56px;
      background: #2f2f2f;
      border: 1px dashed #e8e8e4;
      border-radius: 7px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
      z-index: 10;
    }
    .img-box svg { width: 17px; height: 14px; flex-shrink: 0; }
    .img-box-label {
      font-size: 8px; color: #8a8a8a;
      font-weight: 400; line-height: 12px; text-align: center;
    }

    /* ── AI Analysis Overlay ── */
    .ai-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
    }
    .ai-overlay.active { pointer-events: all; }

    /* Analyzing card */
    .ai-card {
      width: 268px;
      background: #1c1c1e;
      border-radius: 18px;
      padding: 18px 16px 16px;
      border: 1.5px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 40px rgba(100,160,255,0.15);
    }
    .ai-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .ai-spinner-wrap {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(80,130,255,0.12);
      border: 1.5px solid rgba(80,130,255,0.4);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ai-card-title { font-size: 14px; font-weight: 700; color: #fff; }
    .ai-card-subtitle { font-size: 11px; color: #888; margin-top: 1px; }

    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 6px;
      opacity: 0;
      transform: translateY(6px);
    }
    .check-row:last-child { margin-bottom: 0; }
    .check-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .check-label { font-size: 12px; font-weight: 500; color: #ccc; flex: 1; }
    .check-status {
      font-size: 12px; font-weight: 600;
      color: #888;
      white-space: nowrap;
    }
    .check-status.done { color: #4ade80; }

    /* Success card */
    .success-card {
      width: 268px;
      background: #1c1c1e;
      border-radius: 18px;
      padding: 20px 16px 16px;
      border: 1.5px solid #22c55e;
      box-shadow: 0 0 40px rgba(34,197,94,0.25);
      display: none;
      opacity: 0;
    }
    .success-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .success-circle {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #22c55e;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transform: scale(0);
    }
    .success-title { font-size: 14px; font-weight: 700; color: #fff; }
    .success-subtitle { font-size: 11px; color: #888; margin-top: 1px; }
    .success-btns {
      display: flex; gap: 8px;
    }
    .btn-retake {
      flex: 1; padding: 10px;
      background: #2a2a2c; border: none; border-radius: 10px;
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }
    .btn-continue {
      flex: 1.4; padding: 10px;
      background: #22c55e; border: none; border-radius: 10px;
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .btn-retake:hover { background: #3a3a3c; }
    .btn-continue:hover { background: #16a34a; }

    /* ── Next arrow button ── */
    .next-btn {
      position: absolute;
      right: 50px;
      top: 50%;
      transform: translateY(-50%);
      width: 67px; height: 67px;
      cursor: pointer;
      border: none; background: none; padding: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }
    .next-btn svg { display: block; width: 100%; height: 100%; }

    /* ── Counter "0 / 3" ── */
    /* Portrait: left=183, top=853.5 → CCW: x=853.5, y=430−183−12=235 */
    .counter {
      position: absolute;
      left: 822px; top: 244px;
      width: 64px;
      text-align: center;
      font-size: 12px; font-weight: 400;
      color: #8a8a8a;
      letter-spacing: 2.4px;
      line-height: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
<div class="frame">

  <!-- Title -->
  <div class="title">Open Bite</div>

  <!-- Tab strip -->
  <div class="tab-strip">
    <div class="tab-item tab-item--active" data-index="0" onclick="setTab(this)">
      <div class="tab-num">1</div>
      <span class="tab-label">Front</span>
    </div>
    <div class="tab-item tab-item--inactive" data-index="1" onclick="setTab(this)">
      <div class="tab-num">2</div>
      <span class="tab-label">Left side</span>
    </div>
    <div class="tab-item tab-item--inactive" data-index="2" onclick="setTab(this)">
      <div class="tab-num">3</div>
      <span class="tab-label">Right side</span>
    </div>
  </div>

  <script>
    const captured = new Set();

    const checkSVG = `<svg width="10" height="8" viewBox="0 0 10 8" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 3.5L3.8 6.5L9 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    const photoMap = { '0': 'front-photo', '1': 'leftside-photo', '2': 'rightside-photo' };

    function updateViewfinderPhoto(activeIndex) {
      ['front-photo', 'leftside-photo', 'rightside-photo'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const activeId = photoMap[activeIndex];
      if (activeId) {
        const el = document.getElementById(activeId);
        if (el) el.style.display = 'block';
      }
    }

    // Show front photo once DOM is ready
    document.addEventListener('DOMContentLoaded', () => updateViewfinderPhoto('0'));

    function setTab(el) {
      document.querySelectorAll('.tab-item').forEach(t => {
        t.classList.remove('tab-item--active');
        t.classList.add('tab-item--inactive');
      });
      el.classList.remove('tab-item--inactive');
      el.classList.add('tab-item--active');
      updateViewfinderPhoto(el.dataset.index);
    }

    let analyzing = false;

    function showNextButton() {
      const btn = document.getElementById('next-btn');
      btn.style.pointerEvents = 'all';
      gsap.fromTo(btn,
        { opacity: 0, x: 20 },
        { opacity: 1, x: 0, duration: 0.45, ease: 'back.out(1.7)' }
      );
    }

    function goToReview() {
      gsap.to('.frame', {
        opacity: 0, scale: 0.97, duration: 0.35, ease: 'power2.in',
        onComplete: () => { window.location.href = 'preview-138-1829.html'; }
      });
    }

    function capturePhoto() {
      if (analyzing) return;
      const tabs = [...document.querySelectorAll('.tab-item')];

      // All 3 already captured — show next button
      if (captured.size >= 3) { showNextButton(); return; }

      const active = tabs.find(t => t.classList.contains('tab-item--active'));
      if (!active) return;
      const idx = active.dataset.index;
      if (captured.has(idx)) return;

      // Shutter press feel
      gsap.to('.shutter', { scale: 0.88, duration: 0.08, yoyo: true, repeat: 1, ease: 'power2.inOut' });

      analyzing = true;
      runAnalysis(active, idx);
    }

    function runAnalysis(activeTab, idx) {
      const overlay   = document.getElementById('ai-overlay');
      const analyzing = document.getElementById('ai-analyzing');
      const success   = document.getElementById('ai-success');
      const spinner   = document.getElementById('ai-spinner');

      // Reset state
      gsap.set(success, { display: 'none', opacity: 0 });
      gsap.set(analyzing, { display: 'block', opacity: 1 });
      gsap.set('#success-circle', { scale: 0 });
      ['sharpness','lighting','alignment'].forEach(k => {
        const s = document.getElementById('status-' + k);
        s.textContent = 'Checking...';
        s.className = 'check-status';
      });
      gsap.set(['.check-row'], { opacity: 0, y: 6 });

      overlay.classList.add('active');

      const tl = gsap.timeline();

      // 1 — fade in overlay + card
      tl.to(overlay, { opacity: 1, duration: 0.25, ease: 'power2.out' })
        .from(analyzing, { y: 14, opacity: 0, duration: 0.3, ease: 'back.out(1.5)' }, '<0.05');

      // 2 — spin the star icon continuously
      gsap.to(spinner, { rotation: 360, duration: 1.2, repeat: -1, ease: 'none' });

      // 3 — rows stagger in
      tl.to('.check-row', { opacity: 1, y: 0, stagger: 0.18, duration: 0.35, ease: 'power2.out' }, '+=0.15');

      // 4 — resolve each check result one by one
      tl.call(() => {
        const s = document.getElementById('status-sharpness');
        s.textContent = 'Sharp ✓';
        s.classList.add('done');
        gsap.from(s, { scale: 0.7, opacity: 0, duration: 0.3, ease: 'back.out(2)' });
      }, null, '+=0.5');

      tl.call(() => {
        const s = document.getElementById('status-lighting');
        s.textContent = 'Good ✓';
        s.classList.add('done');
        gsap.from(s, { scale: 0.7, opacity: 0, duration: 0.3, ease: 'back.out(2)' });
      }, null, '+=0.55');

      tl.call(() => {
        const s = document.getElementById('status-alignment');
        s.textContent = 'All good ✓';
        s.classList.add('done');
        gsap.from(s, { scale: 0.7, opacity: 0, duration: 0.3, ease: 'back.out(2)' });
      }, null, '+=0.55');

      // 5 — transition to success card
      tl.to(analyzing, { opacity: 0, y: -10, duration: 0.25, ease: 'power2.in' }, '+=0.5')
        .call(() => {
          gsap.killTweensOf(spinner); // stop spin
          gsap.set(analyzing, { display: 'none' });
          gsap.set(success, { display: 'block' });
        })
        .to(success, { opacity: 1, duration: 0.2, ease: 'power2.out' })
        .from(success, { y: 12, duration: 0.3, ease: 'back.out(1.5)' }, '<')
        .to('#success-circle', { scale: 1, duration: 0.45, ease: 'back.out(2.5)' }, '<0.1');

      // 6 — wire up buttons
      document.getElementById('btn-retake').onclick = () => closeOverlay(false);
      document.getElementById('btn-continue').onclick = () => closeOverlay(true, activeTab, idx);
    }

    function closeOverlay(confirm, activeTab, idx) {
      const overlay = document.getElementById('ai-overlay');

      gsap.to(overlay, {
        opacity: 0, duration: 0.2, ease: 'power2.in',
        onComplete: () => {
          overlay.classList.remove('active');
          gsap.set(overlay, { opacity: 0 });
          analyzing = false;

          if (!confirm) return;

          // Mark tab as captured
          captured.add(idx);
          activeTab.classList.add('tab-item--captured');
          activeTab.querySelector('.tab-num').innerHTML = checkSVG;

          // Advance to next uncaptured tab — or go to review screen if all done
          const tabs = [...document.querySelectorAll('.tab-item')];
          const next = tabs.find(t => !captured.has(t.dataset.index));
          if (next) {
            activeTab.classList.remove('tab-item--active');
            activeTab.classList.add('tab-item--inactive');
            next.classList.remove('tab-item--inactive');
            next.classList.add('tab-item--active');
            updateViewfinderPhoto(next.dataset.index);
          } else {
            // All 3 captured — show the next arrow button
            showNextButton();
          }
        }
      });
    }
  </script>

  <!-- Sidebar: X / close -->
  <div class="icon-btn" style="top: 39px;">
    <img src="https://www.figma.com/api/mcp/asset/c20789dd-bc7b-4c8e-9f2b-5c29a07f8950" alt="close" />
  </div>

  <!-- Sidebar: timer / clock (Frame 2147227144) -->
  <div class="icon-btn" style="top: 201px;">
    <svg width="57" height="56" viewBox="0 0 57 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="57" height="56" rx="12" fill="#4E5269"/>

  </div>

  <!-- Sidebar: rotation / flip (Frame 2147227143) -->
  <div class="icon-btn" style="top: 266px;">
    <svg width="57" height="56" viewBox="0 0 57 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="57" height="56" rx="12" fill="#4E5269"/>

    </svg>
  </div>

  <!-- Sidebar: flash / lightning (Group 253) -->
  <div class="icon-btn" style="top: 331px;">
    <svg width="57" height="56" viewBox="0 0 57 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="57" height="56" rx="12" fill="#4E5269"/>
      <path d="M26.2844 42.9312C26.6456 43.0952 27.0656 42.9583 27.2766 42.6043L36.8765 26.4051C37.032 26.1429 37.0413 25.8118 36.9007 25.5414C36.7601 25.2701 36.4913 25.1016 36.1999 25.1016H29.793L32.1757 15.0587C32.2719 14.653 32.0773 14.234 31.7156 14.0689C31.3562 13.9046 30.9336 14.0423 30.7234 14.3957L21.1235 30.595C20.968 30.8571 20.9587 31.1882 21.0993 31.4587C21.2399 31.73 21.5087 31.8984 21.8001 31.8984H28.207L25.8242 41.9413C25.7281 42.3471 25.9226 42.7661 26.2844 42.9312Z" fill="white"/>
    </svg>
  </div>

  <!-- Camera viewfinder oval -->
  <div class="viewfinder">
    <!-- Front photo — shown only when Front tab is active -->
    <img class="viewfinder-photo" id="front-photo"
      src="openbite-front.png" alt="" />
    <!-- Left side photo — shown only when Left side tab is active -->
    <img class="viewfinder-photo" id="leftside-photo"
      src="openbite-leftside.png" alt="" />
    <!-- Right side photo — shown only when Right side tab is active -->
    <img class="viewfinder-photo" id="rightside-photo"
      src="openbite-rightside.png" alt="" />
    <div class="caption-bar">
      <div class="caption-dot">
        <img src="https://www.figma.com/api/mcp/asset/ac85bdba-eb00-40bc-af97-473b38721b60" alt="" />
      </div>
      <span class="caption-text">Face camera directly – teeth centered</span>
    </div>
  </div>

  <!-- Thumbnail photo (landscape only) -->
  <div class="thumbnail">
    <img src="https://www.figma.com/api/mcp/asset/0e9f8685-e2c9-4d98-bb05-98d8f1277005" alt="" />
  </div>

  <!-- Shutter button -->
  <div class="shutter" onclick="capturePhoto()" style="cursor:pointer;">
    <img src="https://www.figma.com/api/mcp/asset/7c85cf95-95af-4304-a87c-1b396094c3c1" alt="capture" />
  </div>



  <!-- Next arrow button (shown when all 3 captured) -->
  <button class="next-btn" id="next-btn" onclick="goToReview()">
    <svg width="67" height="67" viewBox="0 0 67 67" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="33.5" cy="33.5" r="33.5" fill="white"/>
      <path d="M40.2236 24L38.7982 25.4618L45.1412 31.9664H17V34.0337H45.1412L38.7982 40.5382L40.2236 42L49 33L40.2236 24Z" fill="#0E184D"/>
    </svg>
  </button>

  <!-- AI Analysis Overlay -->
  <div class="ai-overlay" id="ai-overlay">

    <!-- Analyzing Card -->
    <div class="ai-card" id="ai-analyzing">
      <div class="ai-card-header">
        <div class="ai-spinner-wrap">
          <svg id="ai-spinner" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2V5M10 15V18M2 10H5M15 10H18M4.22 4.22L6.34 6.34M13.66 13.66L15.78 15.78M4.22 15.78L6.34 13.66M13.66 6.34L15.78 4.22" stroke="#6699ff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="ai-card-title">Analyzing photo...</div>
          <div class="ai-card-subtitle">AI quality check in progress</div>
        </div>
      </div>
      <div class="check-row" id="row-sharpness">
        <div class="check-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#6699ff" stroke-width="1.4"/><circle cx="7" cy="7" r="2" fill="#6699ff"/></svg>
        </div>
        <span class="check-label">Sharpness</span>
        <span class="check-status" id="status-sharpness">Checking...</span>
      </div>
      <div class="check-row" id="row-lighting">
        <div class="check-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v2M7 11v2M1 7h2M11 7h2M2.93 2.93l1.41 1.41M9.66 9.66l1.41 1.41M2.93 11.07l1.41-1.41M9.66 4.34l1.41-1.41" stroke="#f59e0b" stroke-width="1.4" stroke-linecap="round"/><circle cx="7" cy="7" r="2.5" stroke="#f59e0b" stroke-width="1.4"/></svg>
        </div>
        <span class="check-label">Lighting</span>
        <span class="check-status" id="status-lighting">Checking...</span>
      </div>
      <div class="check-row" id="row-alignment">
        <div class="check-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="2" width="10" height="10" rx="2" stroke="#a78bfa" stroke-width="1.4"/><path d="M5 7h4M7 5v4" stroke="#a78bfa" stroke-width="1.4" stroke-linecap="round"/></svg>
        </div>
        <span class="check-label">Alignment</span>
        <span class="check-status" id="status-alignment">Checking...</span>
      </div>
    </div>

    <!-- Success Card -->
    <div class="success-card" id="ai-success">
      <div class="success-top">
        <div class="success-circle" id="success-circle">
          <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
            <path d="M2 8L7.5 13.5L18 2" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="success-title">Photo looks great!</div>
          <div class="success-subtitle">All checks passed</div>
        </div>
      </div>
      <div class="success-btns">
        <button class="btn-retake" id="btn-retake">Retake</button>
        <button class="btn-continue" id="btn-continue">Continue →</button>
      </div>
    </div>

  </div>

</div>
</body>
</html>
