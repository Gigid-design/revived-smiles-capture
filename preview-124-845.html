<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=932, height=430" />
  <title>Revived Smiles – Close Bite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    /* ── Main frame: 932 × 430 ── */
    .frame {
      width: 932px;
      height: 430px;
      background: #121212;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── Title: "Close Bite" ─ centered, top ── */
    .title {
      position: absolute;
      top: 17px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      color: #ffffff;
      letter-spacing: 0;
      white-space: nowrap;
    }

    /* ── Tab strip ── */
    .tab-strip {
      position: absolute;
      top: 47px;
      /* centre the pill strip */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      background: #0a0a0a;
      border-radius: 80px;
      padding: 4px;
      gap: 0;
      height: 40px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 12px 0 6px;
      height: 32px;
      border-radius: 50px;
      cursor: pointer;
      white-space: nowrap;
      min-width: 102px;
      justify-content: flex-start;
    }

    .tab-item--active {
      background: #2f2f2f;
    }

    .tab-num {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      line-height: 1;
    }
    .tab-item--inactive .tab-num {
      background: #3a3a3a;
      color: #0a0a0a;
    }
    .tab-item--active .tab-num {
      background: #ffffff;
      color: #0a0a0a;
    }

    .tab-label {
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
    }
    .tab-item--inactive .tab-label { color: #aaabaf; }
    .tab-item--active   .tab-label { color: #ffffff; }

    /* ── Image thumbnail box ─ bottom-right ── */
    .thumb-box {
      position: absolute;
      left: 821px;
      top: 183px;
      width: 56px;
      height: 56px;
      background: #2f2f2f;
      border: 1px dashed #e8e8e4;
      border-radius: 7px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .thumb-icon {
      width: 17px;
      height: 14px;
      flex-shrink: 0;
    }

    .thumb-no-image {
      font-size: 8px;
      color: #8a8a8a;
      font-weight: 400;
      line-height: 12px;
      text-align: center;
    }

    /* ── Counter "0 / 3" ── */
    .counter {
      position: absolute;
      left: 821px;
      top: 246px;
      width: 56px;
      text-align: center;
      font-size: 12px;
      font-weight: 400;
      color: #8a8a8a;
      letter-spacing: 2.4px;
      line-height: 12px;
    }
  </style>
</head>
<body>
  <div class="frame">

    <!-- Title -->
    <div class="title">Close Bite</div>

    <!-- Tab strip -->
    <div class="tab-strip">

      <!-- Tab 1: Front (inactive) -->
      <div class="tab-item tab-item--inactive">
        <div class="tab-num">1</div>
        <span class="tab-label">Front</span>
      </div>

      <!-- Tab 2: Left side (inactive) -->
      <div class="tab-item tab-item--inactive">
        <div class="tab-num">2</div>
        <span class="tab-label">Left side</span>
      </div>

      <!-- Tab 3: Right side (active) -->
      <div class="tab-item tab-item--active">
        <div class="tab-num">3</div>
        <span class="tab-label">Right side</span>
      </div>

    </div>

    <!-- Image placeholder box -->
    <div class="thumb-box">
      <!-- Camera/image icon -->
      <svg class="thumb-icon" viewBox="0 0 17 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0.5" y="2.5" width="16" height="11" rx="2" stroke="#8a8a8a" stroke-width="1"/>
        <circle cx="8.5" cy="8" r="2.5" stroke="#8a8a8a" stroke-width="1"/>
        <path d="M5.5 2.5L6.5 0.5H10.5L11.5 2.5" stroke="#8a8a8a" stroke-width="1" stroke-linejoin="round"/>
        <circle cx="14" cy="4.5" r="0.75" fill="#8a8a8a"/>
      </svg>
      <span class="thumb-no-image">No image</span>
    </div>

    <!-- Counter -->
    <div class="counter">0&nbsp;/&nbsp;3</div>

  </div>
</body>
</html>
